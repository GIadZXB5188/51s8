<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - 51s8</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#7a00ff;--bg:#0b0b0f;--surface:#131318;--border:rgba(122,0,255,0.15);--neon:#b266ff}
body{background:var(--bg);color:#fff;font-family:'Rajdhani',sans-serif;padding:20px;min-height:100vh}

h1{font-family:'Space Mono',monospace;color:var(--gold);margin-bottom:20px;text-align:center}
h2{font-family:'Space Mono',monospace;font-size:14px;color:var(--neon);margin:20px 0 10px}

.box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.box label{display:block;font-size:12px;color:var(--gold);margin-bottom:6px;font-family:'Space Mono',monospace}
input,textarea{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:10px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;margin-bottom:10px}
input:focus,textarea:focus{border-color:var(--gold);outline:none}
textarea{min-height:80px;resize:vertical}

.row{display:flex;gap:10px;flex-wrap:wrap}
.field{flex:1;min-width:150px}

.colors{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.c{width:30px;height:30px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .2s}
.c:hover{transform:scale(1.15)}
.c.active{border-color:#fff}

.btn{background:var(--gold);border:none;color:#fff;padding:12px 24px;border-radius:8px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;margin-right:10px}
.btn:hover{opacity:.85;box-shadow:0 0 15px rgba(122,0,255,0.4)}
.btn.green{background:#22c55e}
.btn.blue{background:#00e5ff;color:#000}

.preview{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin:20px 0}
.preview h3{color:var(--gold);margin-bottom:12px;font-size:12px;font-family:'Space Mono',monospace}

.link-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.link-row .icon{width:35px;height:35px;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.link-row input[type="text"]{flex:1}

.file-input{display:none}
.file-label{display:flex;align-items:center;justify-content:center;gap:8px;background:#1a1a1a;border:1px dashed var(--border);border-radius:8px;padding:16px;color:var(--gold);font-family:'Space Mono',monospace;cursor:pointer}
.file-label:hover{background:#222}

.actions{position:fixed;bottom:20px;right:20px;display:flex;gap:10px}
.actions button{padding:12px 20px;font-size:12px}

.msg{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;padding:12px 24px;border-radius:8px;font-family:'Space Mono',monospace;display:none}
.msg.show{display:block}
</style>
</head>
<body>

<h1>⚙️ لوحة التحكم</h1>

<!-- الألوان -->
<div class="box">
  <label>اللون الرئيسي</label>
  <div class="colors" id="colorList">
    <div class="c active" style="background:#7a00ff" data="#7a00ff"></div>
    <div class="c" style="background:#b266ff" data="#b266ff"></div>
    <div class="c" style="background:#ff4d4d" data="#ff4d4d"></div>
    <div class="c" style="background:#00e5ff" data="#00e5ff"></div>
    <div class="c" style="background:#22c55e" data="#22c55e"></div>
    <div class="c" style="background:#f97316" data="#f97316"></div>
    <div class="c" style="background:#ec4899" data="#ec4899"></div>
    <input type="color" id="customColor" value="#7a00ff">
  </div>
</div>

<!-- الصورة -->
<div class="box">
  <label>الصورة الشخصية</label>
  <label class="file-label" for="imgInput">
    <span>↑ اختر صورة</span>
    <input type="file" id="imgInput" accept="image/*" class="file-input">
  </label>
  <div id="imgPreview" style="margin-top:10px;color:var(--neon);font-size:12px"></div>
</div>

<!-- الاسم -->
<div class="box">
  <label>الاسم الظاهر</label>
  <input type="text" id="nameInput" placeholder="اسمك" maxlength="20">
</div>

<!-- التيغ -->
<div class="box">
  <label>النص تحت الاسم</label>
  <input type="text" id="tagInput" placeholder="TAG" maxlength="30">
</div>

<!-- الروابط -->
<h2>الرابط 1</h2>
<div class="box">
  <div class="link-row">
    <input type="text" class="icon" id="e0" value="🟣" maxlength="2" placeholder="😊">
    <input type="text" id="n0" placeholder="الاسم" value="Twitch">
  </div>
  <input type="text" id="h0" placeholder="https://..." value="https://www.twitch.tv/51t8">
</div>

<h2>الرابط 2</h2>
<div class="box">
  <div class="link-row">
    <input type="text" class="icon" id="e1" value="▶" maxlength="2" placeholder="😊">
    <input type="text" id="n1" placeholder="الاسم" value="YouTube">
  </div>
  <input type="text" id="h1" placeholder="https://..." value="https://www.youtube.com/channel/UC-fPNAYgQ8uJXhdcGqDYtLg">
</div>

<h2>الرابط 3</h2>
<div class="box">
  <div class="link-row">
    <input type="text" class="icon" id="e2" value="✕" maxlength="2" placeholder="😊">
    <input type="text" id="n2" placeholder="الاسم" value="X · Twitter">
  </div>
  <input type="text" id="h2" placeholder="https://..." value="https://x.com/51s88">
</div>

<h2>الرابط 4</h2>
<div class="box">
  <div class="link-row">
    <input type="text" class="icon" id="e3" value="👻" maxlength="2" placeholder="😊">
    <input type="text" id="n3" placeholder="الاسم" value="Snapchat">
  </div>
  <input type="text" id="h3" placeholder="https://..." value="https://www.snapchat.com/@cood966">
</div>

<h2>الرابط 5</h2>
<div class="box">
  <div class="link-row">
    <input type="text" class="icon" id="e4" value="💬" maxlength="2" placeholder="😊">
    <input type="text" id="n4" placeholder="الاسم" value="Discord">
  </div>
  <input type="text" id="h4" placeholder="https://..." value="https://discord.com/users/1026497328951074826">
</div>

<!-- ازرار الحفظ -->
<div class="actions">
  <button class="btn green" onclick="saveData()">✓ حفظ</button>
  <button class="btn blue" onclick="downloadHTML()">⬇ تحميل HTML</button>
</div>

<div class="msg" id="msg">✓ تم الحفظ!</div>

<script>
const data = JSON.parse(localStorage.getItem('s8_data') || '{}');
const img = localStorage.getItem('s8_img');

// تحميل البيانات
if(data.color) {
  document.getElementById('customColor').value = data.color;
  document.querySelectorAll('.c').forEach(c => {
    c.classList.toggle('active', c.dataset.color === data.color);
  });
}
if(data.uname) document.getElementById('nameInput').value = data.uname;
if(data.tag) document.getElementById('tagInput').value = data.tag;
if(img) document.getElementById('imgPreview').textContent = '✓ صورة محفوظة';

[0,1,2,3,4].forEach(i => {
  if(data.links && data.links[i]) {
    if(data.links[i].emoji) document.getElementById('e'+i).value = data.links[i].emoji;
    if(data.links[i].name) document.getElementById('n'+i).value = data.links[i].name;
    if(data.links[i].href) document.getElementById('h'+i).value = data.links[i].href;
  }
});

// اختيار اللون
document.querySelectorAll('.c').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.c').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    document.getElementById('customColor').value = c.dataset.color;
  });
});
document.getElementById('customColor').addEventListener('input', e => {
  document.querySelectorAll('.c').forEach(x => x.classList.remove('active'));
});

// الصورة
document.getElementById('imgInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    localStorage.setItem('s8_img', ev.target.result);
    document.getElementById('imgPreview').textContent = '✓ تم رفع الصورة';
  };
  reader.readAsDataURL(file);
});

// حفظ
function saveData() {
  const d = {
    color: document.getElementById('customColor').value,
    uname: document.getElementById('nameInput').value,
    tag: document.getElementById('tagInput').value.toUpperCase(),
    links: [{},{},{},{},{}]
  };
  [0,1,2,3,4].forEach(i => {
    d.links[i] = {
      emoji: document.getElementById('e'+i).value,
      name: document.getElementById('n'+i).value,
      href: document.getElementById('h'+i).value
    };
  });
  localStorage.setItem('s8_data', JSON.stringify(d));
  
  const m = document.getElementById('msg');
  m.classList.add('show');
  setTimeout(() => m.classList.remove('show'), 2000);
}

// تحميل HTML
function downloadHTML() {
  saveData();
  
  // جلب القالب
  fetch('index.html')
    .then(r => r.text())
    .then(html => {
      const d = JSON.parse(localStorage.getItem('s8_data') || '{}');
      const img = localStorage.getItem('s8_img');
      
      let out = html;
      
      if(d.uname) {
        out = out.replace(/id="usernameEl">[^<]+</g, 'id="usernameEl">' + d.uname + '<');
        out = out.replace(/id="avPh"[^>]*>[^<]+</g, 'id="avPh" style="display:none">' + d.uname + '<');
      }
      if(d.tag) {
        out = out.replace(/id="tagEl">[^<]+</g, 'id="tagEl">' + d.tag + '<');
      }
      if(d.color) {
        out = out.replace(/:root{--gold:#[^;]+/, ':root{--gold:' + d.color);
        out = out.replace(/--neon:#b266ff/g, '--neon:' + (d.color === '#7a00ff' ? '#b266ff' : d.color));
      }
      if(img) {
        out = out.replace(/src="avatar.png"/g, 'src="' + img + '"');
        out = out.replace(/style="display: none;"/g, 'style="display:block"');
        out = out.replace(/style="display: flex;"/g, 'style="display:none"');
      }
      
      // الروابط
      if(d.links) d.links.forEach((l,i) => {
        if(l.name) out = out.replace(new RegExp('id="ln'+i+'">[^<]+<'), 'id="ln'+i+'">' + l.name + '<');
        if(l.href) out = out.replace(new RegExp('href="[^"]*"(?=\\s*id="lnk'+i+'")'), 'href="' + l.href + '"');
        if(l.emoji) out = out.replace(new RegExp('id="li'+i+'">[^<]+<'), 'id="li'+i+'">' + l.emoji + '<');
        if(l.href) out = out.replace(new RegExp('href="[^"]*"(?=\\s*id="soc'+i+'")'), 'href="' + l.href + '"');
        if(l.emoji) out = out.replace(new RegExp('id="soc'+i+'">[^<]+<'), 'id="soc'+i+'">' + l.emoji + '<');
      });
      
      // حذف الadmin panel من الملف
      out = out.replace(/<!--[\s\S]*?ADMIN PANEL[\s\S]*?<\/div>\s*<\/div>/g, '');
      
      const blob = new Blob([out], {type:'text/html'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
    });
}
</script>
</body>
</html>
